apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: guestbook
  namespace: kargo-advanced
spec:
  subscriptions:
    - image:
        repoURL: ghcr.io/fhirscher/guestbook
        imageSelectionStrategy: SemVer
        allowTags: ^v?[0-9]+\.[0-9]+\.[0-9]+([\+-].*)?$
    - git:
        repoURL: https://github.com/fhirscher/kargo-advanced.git
        branch: main
